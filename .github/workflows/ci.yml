name: Antigravity Architecture CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      - name: Run Quality Gate (Ruff, Mypy)
        run: |
          pre-commit run --all-files

      - name: Test Configuration Merger Atomic Safety
        run: |
          python src/engine/config_manager.py .agent/tmp/mock_gemini.md

      - name: Test Orchestration Engine and Benchmarks
        run: |
          pytest tests/ --collect-only -q > /tmp/collect.txt || true
          if grep -qi "no tests collected" /tmp/collect.txt || grep -qi "error" /tmp/collect.txt; then echo "Error: No tests collected or collection failed!"; exit 1; fi
          pytest tests/ -v

      - name: Build Docker Image
        run: |
          docker build -t antigravity-engine:latest .
