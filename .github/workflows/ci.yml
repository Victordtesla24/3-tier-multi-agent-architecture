name: Antigravity Architecture CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install uv and project dependencies
        run: |
          pip install uv
          uv sync --all-extras

      - name: Validate Configuration Merger Atomic Safety
        run: |
          PYTHONPATH=src python src/engine/config_manager.py .agent/tmp/mock_gemini.md

      - name: Audit test collection (minimum count gate)
        env:
          GOOGLE_API_KEY: dummy
          OPENAI_API_KEY: dummy
          MINIMAX_API_KEY: dummy
          DEEPSEEK_API_KEY: dummy
          MINIMAX_BASE_URL: https://api.minimax.chat/v1
          DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
        run: |
          cd tests
          PYTHONPATH=$GITHUB_WORKSPACE/src python -m pytest \
            test_architecture.py test_crewai_integration.py test_contracts.py \
            --collect-only -q -p no:cacheprovider > /tmp/collect.txt || true
          COUNT=$(grep -c "::" /tmp/collect.txt || true)
          if [ "$COUNT" -lt 10 ]; then
            echo "Error: Expected at least 10 tests, collected $COUNT."
            cat /tmp/collect.txt
            exit 1
          fi
          echo "Test audit passed: $COUNT tests collected."

      - name: Run unit and integration tests
        env:
          GOOGLE_API_KEY: dummy
          OPENAI_API_KEY: dummy
          MINIMAX_API_KEY: dummy
          DEEPSEEK_API_KEY: dummy
          MINIMAX_BASE_URL: https://api.minimax.chat/v1
          DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
        run: |
          cd tests
          PYTHONPATH=$GITHUB_WORKSPACE/src python -m pytest \
            test_architecture.py test_crewai_integration.py test_contracts.py \
            -v -p no:cacheprovider

      - name: Build Docker Image
        run: |
          docker build -t antigravity-engine:latest .
